<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Skeleton Data Viewer</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script src="https://cdn.plot.ly/plotly-2.33.0.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f4efe8;--surface:#ebe5db;--border:#d4cbbf;--text:#3a3028;--muted:#8a7e70;--bone:#5c4a3a;--joint:#6b5847;--left:#01575a;--right:#c43e4e;--x:#6b5847;--y:#01575a;--z:#c43e4e}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif}
  #app{height:100%;display:grid;grid-template-rows:auto auto 1fr auto auto auto}
  header{padding:12px 28px 8px;display:flex;gap:16px;align-items:baseline;border-bottom:1px solid var(--border);background:var(--surface)}
  h1{font-size:18px;font-weight:500}.subtitle{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
  #bar{display:flex;gap:8px;align-items:center;padding:8px 28px;border-bottom:1px solid var(--border);background:var(--surface);font-family:'IBM Plex Mono',monospace;font-size:11px}.bar-label{color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.05em;margin-right:6px}
  .toggle{padding:4px 12px;border:1px solid var(--border);background:transparent;border-radius:3px;color:var(--muted);font-family:inherit;cursor:pointer}.toggle.active{color:var(--text);border-color:var(--bone);background:rgba(92,74,58,.08)}
  #canvas-wrap{position:relative;min-height:0;overflow:hidden}canvas{display:block;width:100%;height:100%}.hud{position:absolute;top:16px;left:18px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.7;color:var(--muted)}.hud .val{color:var(--text);font-weight:500}
  .panel{display:none;border-top:1px solid var(--border);background:var(--bg);overflow:hidden}.panel.visible{display:block}.controls{display:flex;gap:12px;align-items:center;padding:6px 28px;border-bottom:1px solid var(--border);background:var(--surface);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}select{font-family:inherit;font-size:11px;padding:2px 6px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:3px}
  .plot-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;height:190px;padding:4px 12px 8px}.plot{height:100%;min-width:0}
  footer{padding:10px 28px;display:flex;gap:16px;align-items:center;border-top:1px solid var(--border);background:var(--surface);font-family:'IBM Plex Mono',monospace;font-size:11px}button{background:none;border:1px solid var(--border);color:var(--text);padding:5px 14px;border-radius:3px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px}.scrubber{flex:1;display:flex;gap:8px;align-items:center}.scrubber input{flex:1}.val{font-weight:500;color:var(--text)}input[type=range]{accent-color:var(--bone)}
  #loading{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--muted);font-family:'IBM Plex Mono',monospace}
  #loading.hidden{display:none}
</style>
</head>
<body>
<div id="loading">Loading…</div>
<div id="app">
  <header><h1 id="title">Skeleton Data Viewer</h1><span class="subtitle" id="subtitle">Loading…</span></header>
  <div id="bar"><span class="bar-label">Data views</span><button id="toggle-traj" class="toggle">XYZ trajectories</button><button id="toggle-angles" class="toggle">Joint angles</button></div>
  <div id="canvas-wrap"><canvas id="c"></canvas><div class="hud" id="hud"></div></div>
  <div id="traj-panel" class="panel"><div class="controls"><label>Marker: <select id="traj-marker"></select></label></div><div class="plot-row"><div id="tplot0" class="plot"></div><div id="tplot1" class="plot"></div><div id="tplot2" class="plot"></div></div></div>
  <div id="angle-panel" class="panel"><div class="controls"><label>Joint: <select id="angle-joint"></select></label><label>Side: <select id="angle-side"><option value="both">Both</option><option value="left">Left</option><option value="right">Right</option></select></label></div><div class="plot-row"><div id="aplot0" class="plot"></div><div id="aplot1" class="plot"></div><div id="aplot2" class="plot"></div></div></div>
  <footer><button id="btn-play">Pause</button><button id="btn-reset">Reset</button><label>Speed <input type="range" id="speed" min="0.1" max="2" step="0.1" value="1.0"/></label><span id="speed-val">1.0×</span><div class="scrubber"><input type="range" id="scrubber" min="0" max="0" step="1" value="0"/></div><span>Frame <span class="val" id="frame-num">0</span> / <span id="frame-total">0</span></span></footer>
</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
const COLORS={left:'#01575a',right:'#c43e4e',x:'#6b5847',y:'#01575a',z:'#c43e4e'};
const loading=document.getElementById('loading');
const resp=await fetch('/data.json');
const data=await resp.json();
loading.classList.add('hidden');
const {positions,landmarks,connections:rawConns,fps,tracker,joint_angles:angleData,trajectories:trajData,viewer_name:viewerName}=data;
const totalFrames=positions.length,numMarkers=positions[0].length;
document.getElementById('title').textContent=viewerName||'Skeleton Data Viewer';
document.getElementById('subtitle').textContent=`${tracker} · ${totalFrames} frames @ ${fps} Hz`;
document.getElementById('frame-total').textContent=totalFrames-1;
const scrubber=document.getElementById('scrubber');scrubber.max=String(totalFrames-1);
const nameToIdx=new Map();landmarks.forEach((n,i)=>nameToIdx.set(n,i));
const connections=[];rawConns.forEach(([a,b])=>{const ia=typeof a==='number'?a:nameToIdx.get(a),ib=typeof b==='number'?b:nameToIdx.get(b);if(ia!=null&&ib!=null)connections.push([ia,ib]);});
const frame0=positions[0];let minZ=Infinity,maxZ=-Infinity,cx=0,cy=0,cz=0;frame0.forEach(([x,y,z])=>{minZ=Math.min(minZ,z);maxZ=Math.max(maxZ,z);cx+=x;cy+=y;cz+=z});const centroid=[cx/numMarkers,cy/numMarkers,cz/numMarkers],bodyHeight=maxZ-minZ;
const canvas=document.getElementById('c'),wrap=document.getElementById('canvas-wrap');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const scene=new THREE.Scene();scene.background=new THREE.Color(0xf4efe8);
const camera=new THREE.PerspectiveCamera(40,1,1,50000);camera.up.set(0,0,1);const controls=new OrbitControls(camera,canvas);controls.enableDamping=true;
scene.add(new THREE.AmbientLight(0xfff8f0,.7));const keyLight=new THREE.DirectionalLight(0xfff0e0,1.2);keyLight.position.set(1000,-2000,3000);scene.add(keyLight);
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(12000,12000),new THREE.MeshStandardMaterial({color:0xe8e2d8,roughness:.92})));
const grid=new THREE.GridHelper(6000,30,0xd6cfc4,0xd6cfc4);grid.rotation.x=Math.PI/2;grid.position.z=.5;grid.material.opacity=.45;grid.material.transparent=true;scene.add(grid);
const jointRadius=Math.max(8,bodyHeight*.009);const tmp=new THREE.Matrix4();
const jointMesh=new THREE.InstancedMesh(new THREE.SphereGeometry(jointRadius,14,10),new THREE.MeshStandardMaterial({color:0x6b5847,roughness:.6}),numMarkers);jointMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);scene.add(jointMesh);
let lineSegments=null;if(connections.length){const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(connections.length*2*3),3));lineSegments=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0x5c4a3a,transparent:true,opacity:.85}));scene.add(lineSegments)}
function findPelvisIdx(){for(const n of ['pelvis_center','mid_hip','hips_center','sacrum','pelvis'])if(nameToIdx.has(n))return nameToIdx.get(n);let best=0,bd=Infinity;frame0.forEach(([x,y,z],i)=>{const d=Math.hypot(x-centroid[0],y-centroid[1],z-centroid[2]);if(d<bd){bd=d;best=i}});return best}const pelvisIdx=findPelvisIdx();
const camDist=bodyHeight*2.5,camOff=new THREE.Vector3(camDist*.8,-camDist*.6,bodyHeight*.6),target=new THREE.Vector3(centroid[0],centroid[1],centroid[2]*.5);camera.position.copy(target.clone().add(camOff));controls.target.copy(target);let cameraTracking=true;controls.addEventListener('start',()=>cameraTracking=false);
let currentFrame=0,playing=true,speed=1.0,lastTime=0,acc=0;const frameInterval=1000/fps;
function setFrame(k){currentFrame=Math.max(0,Math.min(totalFrames-1,k));const pts=positions[currentFrame];for(let i=0;i<numMarkers;i++){const [x,y,z]=pts[i];if(Number.isNaN(x)||Number.isNaN(y)||Number.isNaN(z))tmp.makeScale(0,0,0);else tmp.makeTranslation(x,y,z);jointMesh.setMatrixAt(i,tmp)}jointMesh.instanceMatrix.needsUpdate=true;if(lineSegments){const a=lineSegments.geometry.attributes.position.array;let o=0;connections.forEach(([ai,bi])=>{const pa=pts[ai],pb=pts[bi];if(pa&&pb&&!Number.isNaN(pa[0])&&!Number.isNaN(pb[0])){a[o++]=pa[0];a[o++]=pa[1];a[o++]=pa[2];a[o++]=pb[0];a[o++]=pb[1];a[o++]=pb[2]}else{for(let n=0;n<6;n++)a[o++]=NaN}});lineSegments.geometry.attributes.position.needsUpdate=true}if(cameraTracking&&pts[pelvisIdx]){const p=pts[pelvisIdx];target.lerp(new THREE.Vector3(p[0],p[1],p[2]*.5),.03);controls.target.copy(target);camera.position.lerp(target.clone().add(camOff),.02)}document.getElementById('frame-num').textContent=currentFrame;scrubber.value=String(currentFrame);document.getElementById('hud').innerHTML=`<div>Tracker: <span class="val">${tracker}</span></div><div>Frame: <span class="val">${currentFrame}</span></div><div>Data views: <span class="val">${trajData?'XYZ ':''}${angleData?'angles':''}</span></div>`;updatePlotWindows(currentFrame)}
function resize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}new ResizeObserver(resize).observe(wrap);resize();
function animate(t){requestAnimationFrame(animate);if(playing){if(!lastTime)lastTime=t;acc+=(t-lastTime)*speed;lastTime=t;while(acc>=frameInterval){acc-=frameInterval;setFrame((currentFrame+1)%totalFrames)}}else lastTime=0;controls.update();renderer.render(scene,camera)}
function plotLayout(title,ytitle){return{margin:{l:45,r:10,t:24,b:24},title:{text:title,font:{family:'IBM Plex Mono',size:11,color:'#8a7e70'}},xaxis:{showgrid:false,range:[0,300]},yaxis:{title:ytitle,automargin:true,showgrid:true,gridcolor:'#e2dbd0',zeroline:true,zerolinecolor:'#d4cbbf'},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',shapes:[{type:'line',xref:'paper',yref:'paper',x0:.5,x1:.5,y0:0,y1:1,line:{color:'#5c4a3a',width:2}}]}}
const plotConfig={responsive:true,displaylogo:false,modeBarButtonsToRemove:['select2d','lasso2d']};const windowHalf=150;
const compLabels={flex_ext:'Flexion / Extension',abd_add:'Abduction / Adduction',int_ext:'Internal / External Rot.',dorsi_plantar:'Dorsiflexion / Plantarflexion',inv_ev:'Inversion / Eversion'};
let angleReady=false,trajReady=false,activeJoint=null,activeSide='both',activeMarker=null;
function initAngles(){if(!angleData||angleReady)return;const sel=document.getElementById('angle-joint');angleData.joints.forEach(j=>{const o=document.createElement('option');o.value=j;o.textContent=j[0].toUpperCase()+j.slice(1);sel.appendChild(o)});activeJoint=angleData.joints[0];sel.addEventListener('change',()=>{activeJoint=sel.value;drawAngles()});document.getElementById('angle-side').addEventListener('change',e=>{activeSide=e.target.value;drawAngles()});angleReady=true;drawAngles()}
function compsForJoint(joint){const comps=angleData.components.filter(c=>angleData.data[`left_${joint}_${c}`]||angleData.data[`right_${joint}_${c}`]);const priority=['flex_ext','dorsi_plantar','abd_add','int_ext','inv_ev'];return comps.sort((a,b)=>(priority.indexOf(a)<0?99:priority.indexOf(a))-(priority.indexOf(b)<0?99:priority.indexOf(b)))}
function drawAngles(){const comps=compsForJoint(activeJoint).slice(0,3);['aplot0','aplot1','aplot2'].forEach((id,i)=>{const div=document.getElementById(id);if(i>=comps.length){div.style.display='none';return}div.style.display='';const comp=comps[i],x=Array.from({length:totalFrames},(_,k)=>k),traces=[];['left','right'].forEach(side=>{if(activeSide!=='both'&&activeSide!==side)return;const arr=angleData.data[`${side}_${activeJoint}_${comp}`];if(arr)traces.push({x,y:arr.slice(0,totalFrames),name:side,mode:'lines',line:{width:1.5,color:COLORS[side]},hovertemplate:`%{y:.1f}°<br>frame %{x}<extra>${side}</extra>`})});Plotly.newPlot(div,traces,plotLayout(compLabels[comp]||comp,'°'),plotConfig)})}
function initTraj(){if(!trajData||trajReady)return;const sel=document.getElementById('traj-marker');trajData.markers.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});activeMarker=trajData.markers[0];sel.addEventListener('change',()=>{activeMarker=sel.value;drawTraj()});trajReady=true;drawTraj()}
function drawTraj(){const marker=trajData.data[activeMarker],frames=trajData.frames;[['tplot0','x','X',COLORS.x],['tplot1','y','Y',COLORS.y],['tplot2','z','Z',COLORS.z]].forEach(([id,axis,label,color])=>{Plotly.newPlot(document.getElementById(id),[{x:frames,y:marker[axis],name:label,mode:'lines',line:{width:1.5,color},hovertemplate:`${label}: %{y:.1f}<br>frame %{x}<extra>${activeMarker}</extra>`}],plotLayout(`${activeMarker} · ${label}`,label),plotConfig)})}
function updatePlotWindows(frame){const range=[frame-windowHalf,frame+windowHalf];if(angleReady&&document.getElementById('angle-panel').classList.contains('visible'))['aplot0','aplot1','aplot2'].forEach(id=>{const div=document.getElementById(id);if(div.style.display!=='none')Plotly.relayout(div,{'xaxis.range':range})});if(trajReady&&document.getElementById('traj-panel').classList.contains('visible'))['tplot0','tplot1','tplot2'].forEach(id=>Plotly.relayout(document.getElementById(id),{'xaxis.range':range}))}
const angleBtn=document.getElementById('toggle-angles'),trajBtn=document.getElementById('toggle-traj');if(!angleData)angleBtn.style.display='none';if(!trajData)trajBtn.style.display='none';
angleBtn.addEventListener('click',()=>{angleBtn.classList.toggle('active');document.getElementById('angle-panel').classList.toggle('visible');initAngles();setTimeout(resize,50)});
trajBtn.addEventListener('click',()=>{trajBtn.classList.toggle('active');document.getElementById('traj-panel').classList.toggle('visible');initTraj();setTimeout(resize,50)});
if(trajData){trajBtn.click()} if(angleData){angleBtn.click()}
setFrame(0);requestAnimationFrame(animate);
document.getElementById('btn-play').addEventListener('click',()=>{playing=!playing;document.getElementById('btn-play').textContent=playing?'Pause':'Play';lastTime=0});
document.getElementById('btn-reset').addEventListener('click',()=>{setFrame(0);cameraTracking=true;target.set(centroid[0],centroid[1],centroid[2]*.5);camera.position.copy(target.clone().add(camOff));controls.target.copy(target)});
document.getElementById('speed').addEventListener('input',e=>{speed=parseFloat(e.target.value);document.getElementById('speed-val').textContent=speed.toFixed(1)+'×'});
scrubber.addEventListener('input',()=>setFrame(Number(scrubber.value)));
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();playing=!playing;document.getElementById('btn-play').textContent=playing?'Pause':'Play';lastTime=0}else if(e.code==='ArrowRight'){e.preventDefault();playing=false;document.getElementById('btn-play').textContent='Play';setFrame(currentFrame+1)}else if(e.code==='ArrowLeft'){e.preventDefault();playing=false;document.getElementById('btn-play').textContent='Play';setFrame(currentFrame-1)}});
</script>
</body>
</html>
